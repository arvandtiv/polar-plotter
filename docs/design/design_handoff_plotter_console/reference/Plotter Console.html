<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Polar Plotter — Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
          mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          ink: {
            950: '#0a0d11',
            900: '#0e1318',
            850: '#131a21',
            800: '#19222b',
            750: '#202b36',
            700: '#2a3845',
            600: '#3a4c5c',
            500: '#5b7186',
            400: '#7e95aa',
            300: '#a7bccd',
          },
          go: { DEFAULT: '#34d399', dim: '#0f3a2c', soft: '#6ee7b7' },
          warn: { DEFAULT: '#fbbf24', dim: '#3d2f0a' },
          stop: { DEFAULT: '#f87171', dim: '#3a1414' },
          cyanx: { DEFAULT: '#38bdf8', dim: '#0b2f44' },
        },
      },
    },
  };
</script>
<style>
  html, body { background: #0a0d11; }
  body { -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0e1318; }
  ::-webkit-scrollbar-thumb { background: #2a3845; border-radius: 6px; border: 2px solid #0e1318; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4c5c; }

  /* Range slider styling */
  input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 4px; border-radius: 999px;
    background: var(--track, #2a3845);
  }
  input[type="range"]::-moz-range-track { height: 4px; border-radius: 999px; background: #2a3845; }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    height: 16px; width: 16px; border-radius: 50%;
    background: var(--thumb, #38bdf8);
    margin-top: -6px;
    border: 2px solid #0e1318;
    box-shadow: 0 0 0 1px var(--thumb, #38bdf8), 0 2px 6px rgba(0,0,0,.5);
    transition: transform .1s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  input[type="range"]::-moz-range-thumb {
    height: 14px; width: 14px; border-radius: 50%;
    background: var(--thumb, #38bdf8); border: 2px solid #0e1318;
  }
  input[type="range"]:focus { outline: none; }

  /* Number input: hide spinners, we use our own */
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  @keyframes pulse-ring { 0% { transform: scale(.85); opacity: .8; } 70%,100% { transform: scale(2.2); opacity: 0; } }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: .25; } }
  .blink { animation: blink 1.1s steps(1) infinite; }
  .log-line { animation: logIn .18s ease-out; }
  @keyframes logIn { from { opacity: .55; transform: translateY(3px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body class="font-sans text-ink-300">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="console-sim.jsx"></script>
  <script type="text/babel" src="console-components.jsx"></script>
  <script type="text/babel" src="console-canvas.jsx"></script>
  <script type="text/babel" src="console-app.jsx"></script>
</body>
</html>
